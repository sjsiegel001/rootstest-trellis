# `deploy_build_before` hook — build Sage 11 theme assets locally, install the
# theme's Composer (Acorn) deps on the remote, then sync compiled assets over.
# Theme folder: web/app/themes/rootstest
---
- name: Install npm dependencies
  command: npm ci
  delegate_to: localhost
  args:
    chdir: "{{ project_local_path }}/web/app/themes/rootstest"

- name: Install Composer dependencies
  command: composer install --no-ansi --no-dev --no-interaction --no-progress --optimize-autoloader --no-scripts --classmap-authoritative
  args:
    chdir: "{{ deploy_helper.new_release_path }}/web/app/themes/rootstest"

- name: Compile assets
  command: npm run build
  delegate_to: localhost
  args:
    chdir: "{{ project_local_path }}/web/app/themes/rootstest"

- name: Check for manifest
  stat:
    path: "{{ project_local_path }}/web/app/themes/rootstest/public/build/manifest.json"
  delegate_to: localhost
  register: entrypoints_data

- name: Entrypoints missing
  ansible.builtin.fail:
    msg: "The theme is missing the build manifest file"
  when: not entrypoints_data.stat.exists

- name: Copy compiled assets
  synchronize:
    src: "{{ project_local_path }}/web/app/themes/rootstest/public"
    dest: "{{ deploy_helper.new_release_path }}/web/app/themes/rootstest"
    group: no
    owner: no
    rsync_opts: --chmod=Du=rwx,--chmod=Dg=rx,--chmod=Do=rx,--chmod=Fu=rw,--chmod=Fg=r,--chmod=Fo=r
