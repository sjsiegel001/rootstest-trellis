# Documentation: https://roots.io/trellis/docs/mail/
# Relays through Amazon SES (see terraform/ses.tf). After `terraform apply`:
#   1. add the DNS records from the ses_* outputs and verify the domain
#   2. request SES production access (leaves the sandbox)
#   3. set mail_user below to the `ses_smtp_username` output
#   4. set vault_mail_password to the `ses_smtp_password` output
#      (trellis vault edit group_vars/all/vault.yml), then re-provision --tags mail
mail_smtp_server: email-smtp.us-east-1.amazonaws.com:587
mail_admin: teeky301@gmail.com
mail_hostname: rootstest.de
mail_user: "REPLACE_WITH_terraform_output_ses_smtp_username"
mail_password: "{{ vault_mail_password }}" # Define in group_vars/all/vault.yml
