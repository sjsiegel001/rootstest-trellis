---
# Trellis does not configure automatic security patching out of the box.
# This role installs unattended-upgrades and enables the -security pocket,
# which Ubuntu's shipped 50unattended-upgrades already allowlists.

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present
    cache_valid_time: 3600

- name: Enable periodic apt updates and unattended upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure automatic reboot behaviour for unattended upgrades
  copy:
    dest: /etc/apt/apt.conf.d/52trellis-unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Automatic-Reboot "{{ unattended_automatic_reboot | ternary('true', 'false') }}";
      Unattended-Upgrade::Automatic-Reboot-Time "{{ unattended_automatic_reboot_time }}";

- name: Ensure unattended-upgrades service is enabled and running
  systemd:
    name: unattended-upgrades
    enabled: true
    state: started
