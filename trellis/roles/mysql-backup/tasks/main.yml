---
- name: Check for the AWS CLI
  stat:
    path: /usr/local/bin/aws
  register: aws_cli
  when: mysql_backup_bucket | length > 0

- name: Install the official AWS CLI v2
  when:
    - mysql_backup_bucket | length > 0
    - not (aws_cli.stat.exists | default(false))
  block:
    - name: Ensure unzip is available
      apt:
        name: unzip
        state: present
        cache_valid_time: 3600

    - name: Download the AWS CLI v2 installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: "0644"

    - name: Unpack the AWS CLI v2 installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Run the AWS CLI v2 installer
      command: /tmp/aws/install
      args:
        creates: /usr/local/bin/aws

- name: Install the MySQL backup script
  template:
    src: mysql-backup.sh.j2
    dest: /usr/local/bin/mysql-backup
    owner: root
    group: root
    mode: "0755"
  when: mysql_backup_bucket | length > 0

- name: Schedule the nightly MySQL backup
  cron:
    name: "mysql-backup {{ item.key }}"
    user: "{{ web_user }}"
    hour: "{{ mysql_backup_hour }}"
    minute: "{{ mysql_backup_minute }}"
    job: "/usr/local/bin/mysql-backup {{ item.key }} >> {{ www_root }}/{{ item.key }}/logs/mysql-backup.log 2>&1"
  loop: "{{ wordpress_sites | dict2items }}"
  when: mysql_backup_bucket | length > 0
