---
- name: Install AWS CLI (streams backups to S3 via the instance IAM role)
  apt:
    name: awscli
    state: present
    cache_valid_time: 3600
  when: mysql_backup_bucket | length > 0

- name: Install the MySQL backup script
  template:
    src: mysql-backup.sh.j2
    dest: /usr/local/bin/mysql-backup
    owner: root
    group: root
    mode: "0755"
  when: mysql_backup_bucket | length > 0

- name: Schedule the nightly MySQL backup
  cron:
    name: "mysql-backup {{ item.key }}"
    user: "{{ web_user }}"
    hour: "{{ mysql_backup_hour }}"
    minute: "{{ mysql_backup_minute }}"
    job: "/usr/local/bin/mysql-backup {{ item.key }} >> {{ www_root }}/{{ item.key }}/logs/mysql-backup.log 2>&1"
  loop: "{{ wordpress_sites | dict2items }}"
  when: mysql_backup_bucket | length > 0
